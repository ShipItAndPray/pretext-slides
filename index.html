<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Slides</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f23; }
    #container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
    }
    #controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    #container:hover #controls { opacity: 1; }
    .btn {
      background: rgba(255,255,255,0.15);
      color: #e2e8f0;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: Inter, system-ui, sans-serif;
      backdrop-filter: blur(8px);
    }
    .btn:hover { background: rgba(255,255,255,0.25); }
    #help {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #64748b;
      font-size: 12px;
      font-family: Inter, system-ui, sans-serif;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      text-align: right;
      line-height: 1.6;
    }
    #container:hover #help { opacity: 1; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div id="container">
    <canvas id="slide-canvas"></canvas>
    <div id="controls">
      <button class="btn" id="prev-btn">&#9664; Prev</button>
      <button class="btn" id="next-btn">Next &#9654;</button>
      <button class="btn" id="fullscreen-btn">Fullscreen (F)</button>
      <button class="btn" id="theme-btn">Toggle Theme</button>
    </div>
    <div id="help">
      &#8592; &#8594; Navigate &middot; F Fullscreen &middot; G Go to slide
    </div>
  </div>

  <script type="module">
    import { parseMarkdownSlides, SlideCanvas, SlideNavigation, lightTheme, darkTheme, layoutSlide, renderText, renderCode, renderBackground, renderProgressBar, renderSlideNumber } from './src/index.ts'

    const sampleMarkdown = `---
theme: dark
font: "Inter"
codeFont: "JetBrains Mono"
---

# Pretext Slides
## Canvas-Powered Presentations

Write markdown. Present at any resolution.

---

## Why Canvas?

- DOM-based tools use CSS hacks for scaling
- Canvas renders natively at any resolution
- Pretext handles text layout perfectly
- No layout shift, no flicker

---

## Two Columns

::: left
Canvas gives you pixel-perfect control over every element on the slide.
:::

::: right
Pretext measures text accurately, so auto-scaling just works.
:::

---

## Code Example

\`\`\`typescript
import { SlideDeck } from '@shipitandpray/pretext-slides'

function App() {
  return <SlideDeck markdown={mySlides} theme="dark" />
}
\`\`\`

---

## Features

- Markdown with --- separators
- Auto-scale text to fit
- Light and dark themes
- Presenter view with timer
- Keyboard navigation
- URL hash for slide number
- PDF export

---

## Keyboard Shortcuts

- Arrow keys: navigate slides
- F: toggle fullscreen
- P: presenter view
- G: go to slide number
- ESC: exit presenter view

---

# Thank You!
## github.com/ShipItAndPray/pretext-slides
`

    const deck = parseMarkdownSlides(sampleMarkdown)
    const canvas = document.getElementById('slide-canvas')
    let isDark = deck.config.theme !== 'light'
    let theme = isDark ? darkTheme : lightTheme

    const renderer = new SlideCanvas({ canvas, theme })

    let currentSlide = 0
    const totalSlides = deck.slides.length

    function render() {
      renderer.setTheme(theme)
      renderer.renderSlide(deck.slides[currentSlide], currentSlide, totalSlides)
    }

    const nav = new SlideNavigation({
      totalSlides,
      onChange: (index) => {
        currentSlide = index
        render()
      },
    })

    nav.setFullscreenToggle(() => {
      if (document.fullscreenElement) {
        document.exitFullscreen()
      } else {
        document.getElementById('container').requestFullscreen()
      }
    })

    nav.bind(document.getElementById('container'))

    // Buttons
    document.getElementById('prev-btn').addEventListener('click', (e) => {
      e.stopPropagation()
      nav.prev()
    })
    document.getElementById('next-btn').addEventListener('click', (e) => {
      e.stopPropagation()
      nav.next()
    })
    document.getElementById('fullscreen-btn').addEventListener('click', (e) => {
      e.stopPropagation()
      if (document.fullscreenElement) {
        document.exitFullscreen()
      } else {
        document.getElementById('container').requestFullscreen()
      }
    })
    document.getElementById('theme-btn').addEventListener('click', (e) => {
      e.stopPropagation()
      isDark = !isDark
      theme = isDark ? darkTheme : lightTheme
      render()
    })

    // Re-render on resize
    window.addEventListener('resize', () => render())

    // Initial render
    render()
  </script>
</body>
</html>
